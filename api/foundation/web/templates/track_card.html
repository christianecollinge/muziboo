{{define "track_card"}}
<div class="group rounded-xl overflow-hidden bg-muziboo-bg-softer border border-muziboo-border hover:border-muziboo-gold/40 transition-all duration-300">
    <!-- Artwork -->
    <div class="relative aspect-square overflow-hidden cursor-pointer"
         onclick="playTrack('{{.AudioURL}}', '{{.Title}}', '{{.ArtistName}}')">
        {{if .ArtworkURL}}
        <img src="{{.ArtworkURL}}" alt="{{.Title}} artwork"
             class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy" />
        {{else}}
        <div class="w-full h-full bg-gradient-to-br from-muziboo-bar-1/30 via-muziboo-bar-3/30 to-muziboo-bar-5/30 flex items-center justify-center">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="text-muziboo-text-muted/40">
                <path d="M9 18V5l12-2v13" /><circle cx="6" cy="18" r="3" /><circle cx="18" cy="16" r="3" />
            </svg>
        </div>
        {{end}}
        <!-- Play overlay -->
        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/30 transition-colors duration-300 flex items-center justify-center">
            <div class="w-14 h-14 rounded-full bg-muziboo-gold text-muziboo-bg flex items-center justify-center opacity-0 group-hover:opacity-100 transform scale-90 group-hover:scale-100 transition-all duration-300 shadow-lg">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21" /></svg>
            </div>
        </div>
        {{if .Genre}}
        <span class="absolute top-3 left-3 px-2.5 py-1 text-xs font-medium rounded-full bg-black/60 text-muziboo-text backdrop-blur-sm">{{.Genre}}</span>
        {{end}}
    </div>
    <!-- Info -->
    <div class="p-4">
        <h3 class="font-semibold text-muziboo-text truncate mb-1">{{.Title}}</h3>
        {{if .ArtistName}}
        <a href="/app/user/{{.ArtistUsername}}" class="flex items-center gap-2 group/artist">
            <div class="w-5 h-5 rounded-full bg-muziboo-gold/20 flex items-center justify-center">
                <span class="text-xs text-muziboo-gold font-medium">{{slice .ArtistName 0 1}}</span>
            </div>
            <span class="text-sm text-muziboo-text-muted group-hover/artist:text-muziboo-gold transition-colors truncate">{{.ArtistName}}</span>
        </a>
        {{end}}
        <div class="flex items-center justify-between mt-3">
            <span class="text-xs text-muziboo-text-muted/60">{{.TimeAgo}}</span>
        </div>
    </div>
</div>
{{end}}
