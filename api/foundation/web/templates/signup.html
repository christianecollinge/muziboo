{{define "content"}}
<div class="max-w-md mx-auto px-4 py-20">
    <div class="bg-muziboo-bg-softer rounded-xl p-8 border border-muziboo-border">
        <h1 class="text-3xl font-semibold text-muziboo-text mb-2">Join Muziboo</h1>
        <p class="text-muziboo-text-muted mb-8">Create an account and share your music with the world.</p>

        <div id="signup-error" class="hidden mb-4 text-muziboo-red text-sm bg-muziboo-red/10 rounded-lg px-4 py-3"></div>
        <div id="signup-success" class="hidden mb-4 text-muziboo-teal-light text-sm bg-muziboo-teal/10 border border-muziboo-teal/30 rounded-lg px-4 py-3"></div>

        <form id="signup-form" class="space-y-5" hx-boost="false">
            <div>
                <label for="username" class="block text-sm font-medium text-muziboo-text mb-1.5">Username</label>
                <input id="username" type="text" required placeholder="your_username"
                       class="w-full px-4 py-3 bg-muziboo-bg border border-muziboo-border rounded-lg text-muziboo-text placeholder:text-muziboo-text-muted/50 focus:outline-none focus:border-muziboo-gold transition-colors" />
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-muziboo-text mb-1.5">Email</label>
                <input id="email" type="email" required placeholder="you@example.com"
                       class="w-full px-4 py-3 bg-muziboo-bg border border-muziboo-border rounded-lg text-muziboo-text placeholder:text-muziboo-text-muted/50 focus:outline-none focus:border-muziboo-gold transition-colors" />
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-muziboo-text mb-1.5">Password</label>
                <input id="password" type="password" required placeholder="Min 6 characters" minlength="6"
                       class="w-full px-4 py-3 bg-muziboo-bg border border-muziboo-border rounded-lg text-muziboo-text placeholder:text-muziboo-text-muted/50 focus:outline-none focus:border-muziboo-gold transition-colors" />
            </div>
            <button type="submit" id="signup-btn"
                    class="w-full bg-muziboo-gold text-muziboo-bg font-semibold px-6 py-3.5 rounded-lg hover:bg-muziboo-text hover:text-muziboo-bg transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                Create Account
            </button>
        </form>

        <p class="text-center text-muziboo-text-muted text-sm mt-6">
            Already have an account?
            <a href="/app/login" class="text-muziboo-gold hover:text-muziboo-text transition-colors">Log in</a>
        </p>
    </div>
{{end}}
