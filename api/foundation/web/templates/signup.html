{{define "content"}}
<div class="max-w-md mx-auto px-4 py-16">
    <div class="bg-muziboo-bg-softer rounded-xl p-8 border border-muziboo-border">
        <h1 class="text-3xl font-semibold text-muziboo-text mb-1">Join Muziboo</h1>
        <p class="text-muziboo-text-muted mb-8 text-sm">Share your music. Get real feedback.</p>

        <div id="signup-error" class="hidden mb-4 text-muziboo-red text-sm bg-muziboo-red/10 rounded-lg px-4 py-3"></div>
        <div id="signup-success" class="hidden mb-4 text-muziboo-teal-light text-sm bg-muziboo-teal/10 border border-muziboo-teal/30 rounded-lg px-4 py-3"></div>

        <!-- Social / Magic Link buttons -->
        <div class="space-y-3 mb-6">
            <!-- Google -->
            <button id="google-btn" type="button" onclick="signInWithProvider('google', this)"
                    class="w-full flex items-center justify-center gap-3 bg-muziboo-bg border border-muziboo-border text-muziboo-text px-4 py-3 rounded-lg text-sm font-medium hover:border-muziboo-gold/50 transition-colors">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </button>

            <!-- Apple -->
            <button id="apple-btn" type="button" onclick="signInWithProvider('apple', this)"
                    class="w-full flex items-center justify-center gap-3 bg-muziboo-bg border border-muziboo-border text-muziboo-text px-4 py-3 rounded-lg text-sm font-medium hover:border-muziboo-gold/50 transition-colors">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.62-1.496 3.6-2.998 1.128-1.62 1.594-3.18 1.623-3.268-.035-.018-3.05-1.168-3.08-4.665-.027-2.924 2.396-4.325 2.508-4.398-1.37-1.992-3.486-2.269-4.225-2.315-2.046-.11-4.053 1.258-4.71 1.258zM15.42 4.145c.828-1 1.385-2.399 1.233-3.791-1.185.048-2.636.786-3.492 1.802-.76.883-1.42 2.306-1.246 3.678 1.32.102 2.678-.68 3.505-1.689z"/>
                </svg>
                Continue with Apple
            </button>

            <!-- Magic Link -->
            <button id="magic-toggle-btn" type="button" onclick="showMagicLink()"
                    class="w-full flex items-center justify-center gap-3 bg-muziboo-bg border border-muziboo-border text-muziboo-text px-4 py-3 rounded-lg text-sm font-medium hover:border-muziboo-gold/50 transition-colors">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                    <polyline points="22,6 12,13 2,6"/>
                </svg>
                Sign up with Magic Link
            </button>
        </div>

        <!-- Divider -->
        <div class="flex items-center gap-3 mb-6">
            <div class="flex-1 h-px bg-muziboo-border"></div>
            <span class="text-xs text-muziboo-text-muted">or with email & password</span>
            <div class="flex-1 h-px bg-muziboo-border"></div>
        </div>

        <!-- Email/Password form -->
        <form id="signup-form" class="space-y-4" onsubmit="handleSignup(event)">
            <div>
                <label for="username" class="block text-sm font-medium text-muziboo-text mb-1.5">Username</label>
                <input id="username" type="text" required placeholder="your_username"
                       class="w-full px-4 py-3 bg-muziboo-bg border border-muziboo-border rounded-lg text-muziboo-text placeholder:text-muziboo-text-muted/50 focus:outline-none focus:border-muziboo-gold transition-colors" />
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-muziboo-text mb-1.5">Email</label>
                <input id="email" type="email" required placeholder="you@example.com"
                       class="w-full px-4 py-3 bg-muziboo-bg border border-muziboo-border rounded-lg text-muziboo-text placeholder:text-muziboo-text-muted/50 focus:outline-none focus:border-muziboo-gold transition-colors" />
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-muziboo-text mb-1.5">Password</label>
                <input id="password" type="password" required placeholder="Min 6 characters" minlength="6"
                       class="w-full px-4 py-3 bg-muziboo-bg border border-muziboo-border rounded-lg text-muziboo-text placeholder:text-muziboo-text-muted/50 focus:outline-none focus:border-muziboo-gold transition-colors" />
            </div>
            <button type="submit" id="signup-btn"
                    class="w-full bg-muziboo-gold text-muziboo-bg font-semibold px-6 py-3.5 rounded-lg hover:bg-muziboo-text hover:text-muziboo-bg transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                Create Account
            </button>
        </form>

        <!-- Magic Link form (hidden by default) -->
        <form id="magic-form" class="space-y-4 hidden" onsubmit="handleMagic(event)">
            <div>
                <label for="magic-email" class="block text-sm font-medium text-muziboo-text mb-1.5">Your email</label>
                <input id="magic-email" type="email" required placeholder="you@example.com"
                       class="w-full px-4 py-3 bg-muziboo-bg border border-muziboo-border rounded-lg text-muziboo-text placeholder:text-muziboo-text-muted/50 focus:outline-none focus:border-muziboo-gold transition-colors" />
            </div>
            <button type="submit" id="magic-btn"
                    class="w-full bg-muziboo-gold text-muziboo-bg font-semibold px-6 py-3.5 rounded-lg hover:bg-muziboo-text hover:text-muziboo-bg transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                Send Magic Link
            </button>
            <button type="button" onclick="showEmailPassword()" class="w-full text-sm text-muziboo-text-muted hover:text-muziboo-text transition-colors">
                ← Use email & password instead
            </button>
        </form>

        <p class="text-center text-muziboo-text-muted text-sm mt-6">
            Already have an account?
            <a href="/app/login" class="text-muziboo-gold hover:text-muziboo-text transition-colors">Log in</a>
        </p>
    </div>
</div>

<script>
function showMagicLink() {
    document.getElementById('signup-form').classList.add('hidden');
    document.getElementById('magic-form').classList.remove('hidden');
}
function showEmailPassword() {
    document.getElementById('magic-form').classList.add('hidden');
    document.getElementById('signup-form').classList.remove('hidden');
}
</script>
{{end}}
