name: Generate Daily SEO Blog Posts

on:
  schedule:
    - cron: '30 4 * * *' # Runs daily at 5:30 AM CET (04:30 UTC)
  workflow_dispatch: # Allows manual trigger from UI

permissions:
  contents: write

jobs:
  generate-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci

      - name: Run SEO Agent Generator
        env:
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run seo:generate

      - name: Commit and Push New Posts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/
          
          # Only commit if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "chore: automated SEO blog generation"
            git push
          else
            echo "No new blog posts generated today."
          fi
