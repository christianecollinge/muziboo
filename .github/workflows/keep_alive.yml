name: Keep Alive Pinger

on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 minutes (GitHub's minimum interval)
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Muziboo
        run: |
          curl -sL https://muziboo.com > /dev/null
          echo "Successfully pinged muziboo.com at $(date)"
